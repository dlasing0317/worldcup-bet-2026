        window.smartPasteOdds = async () => {
            const pwd = prompt("🔐 請輸入莊家密碼："); if (pwd !== "1971") { alert("❌ 密碼錯誤"); return; }
            const matchId = document.getElementById('admin-match-select').value;
            const text = document.getElementById('admin-odds-text').value.trim();
            if(!text) return;
            
            const parts = text.split(/[\s,]+/);
            
            if (parts.length >= 3) {
                let hcapStrRaw = parts[0];
                let homeOdd = parseFloat(parts[1]);
                let awayOdd = parseFloat(parts[2]);
                
                let finalHcapStr = hcapStrRaw.startsWith('[') ? hcapStrRaw : `[${hcapStrRaw}]`;

                if (!isNaN(homeOdd) && !isNaN(awayOdd)) {
                    if(confirm(`🎯 極速破解成功！\n\n盤口: ${finalHcapStr}\n主隊賠率: ${homeOdd}\n客隊賠率: ${awayOdd}\n\n確定同步寫入資料庫？`)) {
                        await setDoc(doc(db, "odds_2026", matchId), { 
                            handicapStr: finalHcapStr, 
                            home: homeOdd, 
                            away: awayOdd, 
                            updatedAt: serverTimestamp() 
                        }, { merge: true }); 
                        document.getElementById('admin-odds-text').value = ''; 
                    }
                    return;
                }
            }
            
            const matchHcap = text.match(/\[(.*?)\]/), matchHome = text.match(/主[^0-9]*([0-9.]+)/), matchAway = text.match(/客[^0-9]*([0-9.]+)/);
            if(matchHcap && matchHome && matchAway) {
                const hStr = `[${matchHcap[1]}]`;
                if(confirm(`🎯 傳統破解成功！盤口: ${hStr}\n確定同步？`)) {
                    await setDoc(doc(db, "odds_2026", matchId), { handicapStr: hStr, home: parseFloat(matchHome[1]), away: parseFloat(matchAway[1]), updatedAt: serverTimestamp() }, { merge: true }); 
                    document.getElementById('admin-odds-text').value = ''; 
                }
            } else {
                alert("❌ 格式錯誤！\n請直接輸入三個數字（用空格分開）。\n例如：-0.5/-1 1.87 1.89");
            }
        };

        window.autoSettleMatch = async (matchId, scoreHome, scoreAway, hcapStr, homeTeamName) => {
            let hcapVal = 0;
            let hcapClean = hcapStr.replace('[', '').replace(']', '').replace('+', '');
            if(hcapClean.includes('/')) { 
                let parts = hcapClean.split('/'); 
                hcapVal = (parseFloat(parts[0]) + parseFloat(parts[1])) / 2; 
            } else { 
                hcapVal = parseFloat(hcapClean) || 0; 
            }
            
            let netHomeScore = scoreHome - scoreAway + hcapVal;

            try {
                const snapshot = await getDocs(query(collection(db, "bets"), where("matchId", "==", matchId)));
                
                snapshot.forEach(async (document) => { 
                    const bet = document.data(); 
                    if (bet.settled === true) return; 

                    let profit = 0; 
                    let betNetScore = bet.selection === homeTeamName ? netHomeScore : -netHomeScore;
                    
                    if (betNetScore >= 0.5) profit = bet.amount * (bet.odds - 1); 
                    else if (betNetScore === 0.25) profit = (bet.amount / 2) * (bet.odds - 1); 
                    else if (betNetScore === 0) profit = 0; 
                    else if (betNetScore === -0.25) profit = -(bet.amount / 2); 
                    else profit = -bet.amount;
                    
                    let detailMsg = `賽果 ${scoreHome}:${scoreAway} | 盤口 ${hcapStr||"[0]"} | 淨勝 ${betNetScore>0?'+'+betNetScore:betNetScore}球`;
                    await updateDoc(doc(db, "bets", document.id), { settled: true, profit: profit, settleDetail: detailMsg }); 
                });
                console.log(`✅ 已自動派彩賽事 ID: ${matchId}`);
            } catch(e) { 
                console.error("❌ 自動派彩失敗: " + e.message); 
                alert("🚨 派彩系統出錯：" + e.message);
            }
        };

            const matchId = document.getElementById('admin-match-select').value;
            const scoreHome = parseInt(document.getElementById('score-home').value);
            const scoreAway = parseInt(document.getElementById('score-away').value);

            let match = window.globalMatches.find(m => m.id === matchId);
            if (match) {
                let now = new Date();
                let matchDateObj = new Date(match.date);
                let isStarted = (match.status !== 'NS' && match.status !== 'TBD') || (now >= matchDateObj);
                if (isStarted || ['FT', 'AET', 'PEN'].includes(match.status)) {
                    alert("⛔ 莊家已截飛！賽事已經開始或完結，唔可以再落注！");

            // 🎯 設定預設注碼 (R32 及其他賽事)

            let step = 5;

                step = 10;

            if (match && (['F_1', 'TH_1'].includes(match.id) || (match.month === 7 && (match.dateNum === 18 || match.dateNum === 19)))) {
                minBet = 1000;
                maxBet = 50000;
                step = 2500;
            }

            window.pendingBet = { matchId, selection, odds, player: currentPlayer, minBet, maxBet, step };

            let amountChange = direction > 0 ? step : -step;

            let current = parseInt(input.innerText) || minBet;

            const apiKey = prompt("🔑 確認使用 API-Sports 同步？(留空取消)", "c97d7ade3c22173f1ec6623c7ef91c23");
            if (!apiKey) return;

            try {
                alert("📡 正在連接 API 獲取最新賽況... (請勿關閉視窗)");
                
                const resMatches = await fetch("https://v3.football.api-sports.io/fixtures?league=1&season=2026", { method: "GET", headers: { "x-apisports-key": apiKey } });
                const dataMatches = await resMatches.json();
                
                if (dataMatches.errors && Object.keys(dataMatches.errors).length > 0) throw new Error("API 存取被拒: " + Object.values(dataMatches.errors)[0]);
                
                let matchesCount = 0;
                let autoSettledCount = 0;

                if (dataMatches.response && dataMatches.response.length > 0) {
                    matchesCount = dataMatches.response.length;
                    
                    let sortedAPI = dataMatches.response.sort((a,b) => (a.fixture?.timestamp || 9999999999) - (b.fixture?.timestamp || 9999999999) || a.fixture?.id - b.fixture?.id);
                    let kIndex = 0;

                    const promises = sortedAPI.map(async (item, index) => {
                        let mId = String(item.fixture?.id || '');
                        if (!mId) return;
                        
                        let hEng = String(item.teams?.home?.name || "TBD");
                        let aEng = String(item.teams?.away?.name || "TBD");
                        let hTC = window.teamMap[hEng] || hEng;
                        let aTC = window.teamMap[aEng] || aEng;
                        let mStatus = String(item.fixture?.status?.short || "NS");
                        let mScoreH = item.goals?.home !== undefined && item.goals?.home !== null ? item.goals.home : null;
                        let mScoreA = item.goals?.away !== undefined && item.goals?.away !== null ? item.goals.away : null;

                        let mDate = String(item.fixture?.date || '');
                        
                        if (!mDate || mDate.includes("00:00:00") || mDate === 'null' || mDate === 'undefined') {
                            if (index >= 72 && kIndex < 32) {
                                mDate = window.kDates[kIndex];
                            }
                        }
                        if (index >= 72) kIndex++;

                        await setDoc(doc(db, "matches_2026", mId), { 
                            id: mId, home: hTC, away: aTC, date: mDate,
                            status: mStatus, scoreHome: mScoreH, scoreAway: mScoreA, 
                            updatedAt: serverTimestamp() 
                        }, { merge: true });

                        if (['FT', 'AET', 'PEN'].includes(mStatus) && mScoreH !== null && mScoreA !== null) {
                            const oddsDoc = await getDoc(doc(db, "odds_2026", mId));
                            let hcapStr = "[0]";
                            if (oddsDoc.exists()) {
                                hcapStr = String(oddsDoc.data().handicapStr || "[0]");
                            }
                            await window.autoSettleMatch(mId, mScoreH, mScoreA, hcapStr, hTC);
                            autoSettledCount++;
                        }
                    });
                    await Promise.all(promises);
                }

                alert(`📡 成功獲取 ${matchesCount} 場賽事！\n(觸發了 ${autoSettledCount} 場自動派彩)\n\n🔄 準備進行【全頁數】盤口深度掃描...`);
                
                let oddsCount = 0;
                let fallbackCount = 0;

                const firstOddsRes = await fetch("https://v3.football.api-sports.io/odds?league=1&season=2026&bookmaker=1&page=1", { method: "GET", headers: { "x-apisports-key": apiKey } });
                const firstOddsData = await firstOddsRes.json();
                let totalPages = 1;
                if (firstOddsData.paging) {
                    totalPages = firstOddsData.paging.total || 1;
                }

                for (let p = 1; p <= totalPages; p++) {
                    let pageRes, pageData;
                    if (p === 1) {
                        pageData = firstOddsData;
                    } else {
                        pageRes = await fetch(`https://v3.football.api-sports.io/odds?league=1&season=2026&bookmaker=1&page=${p}`, { method: "GET", headers: { "x-apisports-key": apiKey } });
                        pageData = await pageRes.json();
                    }

                    if (pageData.response && pageData.response.length > 0) {
                        for (const item of pageData.response) {
                            oddsCount++;
                            let mId = String(item.fixture.id);
                            let bookmaker = item.bookmakers[0];
                            
                            if (bookmaker && bookmaker.bets) {
                                let handicapBet = bookmaker.bets.find(b => b.name === "Asian Handicap");
                                let matchWinnerBet = bookmaker.bets.find(b => b.name === "Match Winner");
                                
                                let homeOdd = 0, awayOdd = 0, hcapStr = "[0]";

                                if (matchWinnerBet) {
                                    fallbackCount++;
                                    let hBet = matchWinnerBet.values.find(v => v.value === "Home");
                                    let aBet = matchWinnerBet.values.find(v => v.value === "Away");
                                    if (hBet) homeOdd = parseFloat(hBet.odd);
                                    if (aBet) awayOdd = parseFloat(aBet.odd);
                                }

                                if (handicapBet && handicapBet.values && handicapBet.values.length > 0) {
                                    let bestPair = null;
                                    let minDiff = 999;

                                    let homeOptions = handicapBet.values.filter(v => String(v.value).startsWith("Home"));
                                    let awayOptions = handicapBet.values.filter(v => String(v.value).startsWith("Away"));

                                    homeOptions.forEach(h => {
                                        let hcapNumStr = String(h.value).replace("Home", "").trim();
                                        let hcapNum = parseFloat(hcapNumStr) || 0;

                                        let a = awayOptions.find(opt => {
                                            let aNumStr = String(opt.value).replace("Away", "").trim();
                                            let aNum = parseFloat(aNumStr) || 0;
                                            return aNumStr === hcapNumStr || (aNum === -hcapNum);
                                        });

                                        if (a) {
                                            let diff = Math.abs(parseFloat(h.odd) - parseFloat(a.odd));
                                            if (diff < minDiff) {
                                                minDiff = diff;
                                                let displaySign = hcapNum > 0 ? `+${hcapNum}` : `${hcapNum}`;
                                                if (hcapNum === 0) displaySign = "0";
                                                bestPair = { home: h, away: a, hcap: `[${displaySign}]` };
                                            }
                                        }
                                    });

                                        awayOdd = parseFloat(bestPair.away.odd);
                                        hcapStr = bestPair.hcap;
                                    }

                                }

window.generateBracketCard = (slotData, isFinal = false, matchIndex = 0) => {

                    const b = window.bracketStructure;
                    const allSlots = [...b.r32, ...b.r16, ...b.qf, ...b.sf, ...b.third, ...b.f];
                    let isKnown = (t) => t && typeof t === 'string' && t !== 'TBD' && !t.match(/^[1-3][A-L]/);

                    rawApiMatches.forEach(m => {
                        if (!m.date) return;
                        let d = new Date(m.date);
                        if (isNaN(d.getTime())) return; 

                        if (d.getMonth() < 5 || (d.getMonth() === 5 && d.getDate() < 28)) { 
                            let dStr = d.toLocaleDateString('zh-HK', { month: 'short', day: 'numeric' });
                            let tStr = d.toLocaleTimeString('zh-HK', { hour: '2-digit', minute:'2-digit' });
                            finalMatches.push({
                                id: m.id, home: m.home, away: m.away, date: m.date, status: m.status,
                                scoreHome: m.scoreHome, scoreAway: m.scoreAway,
                                dateStr: dStr, month: d.getMonth() + 1, dateNum: d.getDate(),
                                weekday: '星期' + weekdaysCH[d.getDay()], kickoff: tStr, odds: m.odds
                            });
                            m.used = true;
                        }
                    });

                    let koApiMatches = rawApiMatches.filter(m => !m.used);
                    koApiMatches.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime() || a.id - b.id);

                    allSlots.forEach(slot => {
                        let dObj = new Date(slot.iso);
                        if (isNaN(dObj.getTime())) return; 
                        let dStr = dObj.toLocaleDateString('zh-HK', { month: 'short', day: 'numeric' });
                        let tStr = dObj.toLocaleTimeString('zh-HK', { hour: '2-digit', minute:'2-digit' });

                        let koMatch = {
                            id: slot.id, home: slot.home, away: slot.away, date: slot.iso, status: 'NS',
                            scoreHome: null, scoreAway: null, dateStr: dStr, month: dObj.getMonth() + 1,
                            dateNum: dObj.getDate(), weekday: '星期' + weekdaysCH[dObj.getDay()],
                            kickoff: tStr, odds: { handicapStr: "", home: 0, away: 0 }
                        };

                        let kIndex = window.kDates.indexOf(slot.iso);
                        let matchFound = (kIndex !== -1 && kIndex < koApiMatches.length) ? koApiMatches[kIndex] : null;

                        if (matchFound) {
                            koMatch.id = matchFound.id;
                            let apiHome = String(matchFound.home);
                            let apiAway = String(matchFound.away);
                            
                            koMatch.home = isKnown(apiHome) ? window.teamMap[apiHome] || apiHome : slot.home;
                            koMatch.away = isKnown(apiAway) ? window.teamMap[apiAway] || apiAway : slot.away;
                            
                            koMatch.status = matchFound.status;
                            koMatch.scoreHome = matchFound.scoreHome;
                            koMatch.scoreAway = matchFound.scoreAway;
                            koMatch.odds = matchFound.odds;
                            matchFound.used = true;
                        }
                        finalMatches.push(koMatch);
                    });

                    window.globalMatches = finalMatches.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
                    window.renderDateFilter(); 
                    window.renderMatches(); 
                    window.renderBracket();
                } catch (e) {
                    console.error("Critical Matches Sync Error:", e);
                }
            });
        };

        window.initMatches(); 
        window.updateHeaderBalance();

        onSnapshot(collection(db, "odds_2026"), (snapshot) => { 
            try {
                let needsRender = false; 
                snapshot.forEach((doc) => { 
                    const newOdds = doc.data(); 
                    const matchIndex = window.globalMatches.findIndex(m => m.id === doc.id); 
                    if(matchIndex !== -1) { 
                        window.globalMatches[matchIndex].odds = { handicapStr: newOdds.handicapStr || "", home: newOdds.home, away: newOdds.away }; 
                        needsRender = true; 
                    } 
                }); 
                if(needsRender) { window.renderMatches(); window.renderBracket(); }
            } catch (e) { console.error("Odds Snapshot Error", e); }
        }); 

        onSnapshot(query(collection(db, "bets"), orderBy("timestamp", "desc")), (snapshot) => {
            try {
                const betsList = document.getElementById('bets-list'), leaderboardDiv = document.getElementById('leaderboard');
                if(!betsList || !leaderboardDiv) return;
                betsList.innerHTML = ''; 
                
                window.playerBalances = { "Dennis": 0, "Samuel": 0, "Charles": 0, "Michael": 0, "Sha": 0, "Travis": 0 };
                
                if (snapshot.empty) { 
                    betsList.innerHTML = '<p class="text-gray-600 text-sm text-center">無紀錄</p>'; 
                    leaderboardDiv.innerHTML = '<p class="text-gray-600 text-sm text-center">無紀錄</p>'; 
                    window.updateHeaderBalance(); 
                    return; 
                }
                
                let matchGroupMap = new Map();
                
                snapshot.forEach((docSnap) => {
                    const bet = docSnap.data();
                    if(!bet) return;
                    bet.docId = docSnap.id; 
                    
                    if (bet.settled && window.playerBalances[bet.player] !== undefined) {
                        window.playerBalances[bet.player] += bet.profit;
                    }
                    
                    if (!matchGroupMap.has(bet.matchId)) {
                        matchGroupMap.set(bet.matchId, []);
                    }
                    matchGroupMap.get(bet.matchId).push(bet);
                });
                
                matchGroupMap.forEach((bets, matchId) => {
                    let match = window.globalMatches.find(m => m.id === matchId);
                    let matchHeaderHtml = '';
                    
                    if (match) {
                        let hName = String(window.teamMap[match.home] || match.home);
                        let aName = String(window.teamMap[match.away] || match.away);
                        let scoreTxt = (match.scoreHome !== null && match.scoreAway !== null) ? ` (${match.scoreHome}:${match.scoreAway})` : '';
                        matchHeaderHtml = `
                            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                                <div class="flex items-center space-x-2 text-xs font-bold text-gray-400 tracking-wide uppercase">
                                    <span>⚽ ${window.getFlag(hName)} ${hName} VS ${window.getFlag(aName)} ${aName}${scoreTxt}</span>
                                </div>
                                <span class="text-[10px] bg-gray-800 text-gray-500 font-mono px-1.5 py-0.5 rounded">${match.dateStr || ''}</span>
                            </div>
                        `;
                    } else {
                        matchHeaderHtml = `
                            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                                <div class="text-xs font-bold text-gray-500 tracking-wide uppercase">
                                    <span>⚽ 賽事 ID: ${matchId}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    let betsItemsHtml = bets.map(bet => {
                        let resTxt = "等待開彩", resCol = "text-yellow-500 bg-yellow-500/10 px-2 py-1 rounded";
                        if (bet.settled) {
                            if (bet.profit > 0 && bet.profit < (bet.amount * (bet.odds - 1))) { resTxt = `贏半 +$${bet.profit.toFixed(1)}`; resCol = "text-green-400 bg-green-500/10 px-2 py-1 rounded"; }
                            else if (bet.profit > 0) { resTxt = `贏全 +$${bet.profit.toFixed(1)}`; resCol = "text-green-500 font-bold bg-green-500/10 px-2 py-1 rounded"; }
                            else if (bet.profit === 0) { resTxt = `走水 $0`; resCol = "text-gray-400 bg-gray-600/20 px-2 py-1 rounded"; }
                            else if (bet.profit < 0 && bet.profit > -bet.amount) { resTxt = `輸半 -$${Math.abs(bet.profit).toFixed(1)}`; resCol = "text-red-400 bg-red-500/10 px-2 py-1 rounded"; }
                            else { resTxt = `輸全 -$${Math.abs(bet.profit).toFixed(1)}`; resCol = "text-red-500 font-bold bg-red-500/10 px-2 py-1 rounded"; }
                        }
                        
                        let playerStr = bet.player ? String(bet.player) : '?';
                        let initial = playerStr.charAt(0).toUpperCase();
                        let betAvatarColor = window.avatarColors[playerStr] || 'bg-gray-600';
                        let displaySelection = window.teamMap[bet.selection] || bet.selection;
                        
                        let deleteBtn = `<button onclick="window.deleteBet('${bet.docId}')" style="display: ${window.authenticatedUser === 'Dennis' ? 'flex' : 'none'};" class="admin-only-btn ml-3 text-red-500 hover:text-red-400 transition-colors bg-red-900/20 rounded p-1.5 flex-shrink-0 touch-manipulation items-center justify-center"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>`;
                        
                        return `
                            <div class="flex justify-between items-center py-2 last:pb-0 border-b border-gray-800/40 last:border-0">
                                <div class="flex items-center space-x-3 overflow-hidden">
                                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white shadow-sm border border-gray-700 flex-shrink-0 ${betAvatarColor}">${initial}</div>
                                    <div class="truncate">
                                        <p class="font-bold text-gray-200 text-sm mb-0.5">${playerStr}</p>
                                        <p class="text-xs text-gray-400 truncate">買: <span class="text-yellow-500 font-semibold">${displaySelection}</span> <span class="font-mono text-gray-500">($${bet.amount})</span></p>
                                    </div>
                                </div>
                                <div class="flex items-center justify-end flex-shrink-0 ml-2">
                                    <div class="text-right">
                                        <span class="text-xs ${resCol} inline-block">${resTxt}</span>
                                        <span class="block text-[9px] text-gray-500 mt-1 font-mono tracking-tighter">${bet.settleDetail||''}</span>
                                    </div>
                                    ${deleteBtn}
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    betsList.innerHTML += `
                        <div class="glass-panel p-4 rounded-2xl shadow-lg">
                            ${matchHeaderHtml}
                            <div class="space-y-1.5">${betsItemsHtml}</div>
                        </div>
                    `;
                });
                
                leaderboardDiv.innerHTML = '';
                
                let sortedPlayers = Object.keys(window.playerBalances).sort((a, b) => window.playerBalances[b] - window.playerBalances[a]);
                let uniqueBalances = [...new Set(Object.values(window.playerBalances))].sort((a, b) => b - a);

                sortedPlayers.forEach((p) => {
                    let bal = window.playerBalances[p], cClass = bal > 0 ? 'text-green-500' : (bal < 0 ? 'text-red-500' : 'text-gray-400');
                    
                    let denseRank = uniqueBalances.indexOf(bal);
                    let rankMedal = denseRank === 0 ? '🥇' : (denseRank === 1 ? '🥈' : (denseRank === 2 ? '🥉' : '<span class="w-[18px] inline-block"></span>'));
                    
                    let boardAvatarColor = window.avatarColors[p] || 'bg-gray-600';
                    
                    leaderboardDiv.innerHTML += `
                        <div class="flex justify-between items-center py-3 border-b border-gray-800 last:border-0">
                            <div class="flex items-center space-x-2">
                                <span class="text-lg mr-1">${rankMedal}</span>
                                <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-white shadow-sm border border-gray-700 ${boardAvatarColor}">${String(p).charAt(0).toUpperCase()}</div>
                                <span class="text-gray-200 text-sm font-semibold tracking-wide">${p}</span>
                            </div>
                            <span class="font-bold font-mono ${cClass}">${bal>0?'+':''}$${bal.toFixed(1)}</span>
                        </div>`;
                });
            } catch(e) { console.error("Bets Error:", e); } finally {
                window.updateHeaderBalance(); 
            }
        });

    </script>
</body>
</html>
