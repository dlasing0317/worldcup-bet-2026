            return `

                    const matchIndex = globalMatches.findIndex(m => m.id === doc.id); 
                    if(matchIndex !== -1) { 
                        globalMatches[matchIndex].odds = { handicapStr: newOdds.handicapStr || "", home: newOdds.home, away: newOdds.away }; 
                        needsRender = true; 
                    } 
                }); 
                if(needsRender) { renderMatches(); renderBracket(); }
            }); 
        }
        
        loadMatches();

        window.smartPasteOdds = async () => {
            const pwd = prompt("🔐 請輸入莊家密碼："); if (pwd !== "1971") { alert("❌ 密碼錯誤"); return; }
            const matchId = document.getElementById('admin-match-select').value, text = document.getElementById('admin-odds-text').value;
            if(!text) return;
            const matchHcap = text.match(/\[(.*?)\]/), matchHome = text.match(/主[^0-9]*([0-9.]+)/), matchAway = text.match(/客[^0-9]*([0-9.]+)/);
            if(matchHcap && matchHome && matchAway) {
                const hStr = `[${matchHcap[1]}]`;
                if(confirm(`🎯 破解成功！盤口: ${hStr}\n確定同步？`)) {
                    await setDoc(doc(db, "odds", matchId), { handicapStr: hStr, home: parseFloat(matchHome[1]), away: parseFloat(matchAway[1]), updatedAt: serverTimestamp() }); 
                    document.getElementById('admin-odds-text').value = ''; 
                }
            } else alert("❌ 格式錯誤");
        };

        window.settleMatch = async () => {
            const pwd = prompt("🔐 密碼："); if (pwd !== "1971") return;
            const matchId = document.getElementById('admin-match-select').value, scoreHome = parseInt(document.getElementById('score-home').value), scoreAway = parseInt(document.getElementById('score-away').value);
            if(isNaN(scoreHome) || isNaN(scoreAway)) return;
            const match = globalMatches.find(m => m.id === matchId); if (!match) return;
            if(!confirm(`⚠️ 確定賽果 ${scoreHome}:${scoreAway} (90分鐘內)？`)) return;

            let hcapStr = match.odds.handicapStr.replace('[', '').replace(']', '').replace('+', ''), hcapVal = 0;
            if(hcapStr.includes('/')) { let parts = hcapStr.split('/'); hcapVal = (parseFloat(parts[0]) + parseFloat(parts[1])) / 2; } else { hcapVal = parseFloat(hcapStr) || 0; }
            let netHomeScore = scoreHome - scoreAway + hcapVal;

            try {
                const snapshot = await getDocs(query(collection(db, "bets"), where("matchId", "==", matchId), where("settled", "==", false)));
                snapshot.forEach(async (document) => { 
                    const bet = document.data(); let profit = 0; let betNetScore = bet.selection === match.home ? netHomeScore : -netHomeScore;
                    if (betNetScore >= 0.5) profit = bet.amount * (bet.odds - 1); else if (betNetScore === 0.25) profit = (bet.amount / 2) * (bet.odds - 1); else if (betNetScore === 0) profit = 0; else if (betNetScore === -0.25) profit = -(bet.amount / 2); else profit = -bet.amount;
                    let detailMsg = `賽果 ${scoreHome}:${scoreAway} | 盤口 ${match.odds.handicapStr||"[0]"} | 淨勝 ${betNetScore>0?'+'+betNetScore:betNetScore}球`;
                    await updateDoc(doc(db, "bets", document.id), { settled: true, profit: profit, settleDetail: detailMsg }); 
                });
                alert("✅ 派彩完成"); document.getElementById('score-home').value = ''; document.getElementById('score-away').value = '';
            } catch(e) { alert("❌ 失敗"); }
        };

        window.updateHeaderBalance = () => {
            let currentUser = document.getElementById('player-select').value;
            let bal = window.playerBalances[currentUser] || 0;
            let headerBal = document.getElementById('header-balance');
            headerBal.innerText = `${bal > 0 ? '+' : ''}$${bal.toFixed(1)} HKD`;
            headerBal.className = `text-sm font-bold ${bal > 0 ? 'text-green-500' : (bal < 0 ? 'text-red-500' : 'text-gray-400')}`;
            
            let avatarEl = document.getElementById('header-avatar');
            let newColor = avatarColors[currentUser] || 'bg-gray-600';
            avatarEl.className = `w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white shadow-md border border-gray-700 transition-colors duration-300 ${newColor}`;
            avatarEl.innerText = currentUser.charAt(0);

            let adminSec = document.getElementById('admin-section');
            if (adminSec) {
                if (currentUser === 'Dennis') { adminSec.classList.remove('hidden'); } 
                else { adminSec.classList.add('hidden'); }
            }
        };

        document.getElementById('player-select').addEventListener('change', async (e) => {
            const selectedUser = e.target.value;
            const enteredPin = prompt(`🔐 切換帳號驗證\n請輸入「${selectedUser}」嘅專屬 4 位 PIN 碼：`);
            
            if (!enteredPin) {
                e.target.value = window.previousUser;
                return;
            }

            try {
                const playerDocRef = doc(db, "players", selectedUser);
                const playerDocSnap = await getDoc(playerDocRef);

                if (playerDocSnap.exists() && playerDocSnap.data().pin === enteredPin) {
                    window.authenticatedUser = selectedUser;
                    window.previousUser = selectedUser;
                    window.updateHeaderBalance();
                } else {
                    alert("❌ 密碼錯誤！無權切換至此帳號。");
                    e.target.value = window.previousUser; 
                }
            } catch (error) {
                console.error(error);
                alert("🚨 系統錯誤：無法連接至伺服器驗證密碼。");
                e.target.value = window.previousUser;
            }
        });

        window.placeBet = async (matchId, selection, odds) => {
            if(odds === 0) { alert("⚠️ 莊家尚未開盤，暫時無法落注。"); return; }
            const currentPlayer = document.getElementById('player-select').value;
            
            if (window.authenticatedUser !== currentPlayer) {
                const enteredPin = prompt(`🔐 安全驗證\n請輸入「${currentPlayer}」嘅專屬 4 位 PIN 碼：`);
                if (!enteredPin) return; 

                try {
                    const playerDocRef = doc(db, "players", currentPlayer);
                    const playerDocSnap = await getDoc(playerDocRef);

                    if (playerDocSnap.exists() && playerDocSnap.data().pin === enteredPin) {
                        window.authenticatedUser = currentPlayer;
                        window.previousUser = currentPlayer;
                        window.updateHeaderBalance();
                    } else {
                        alert("❌ 密碼錯誤！嚴禁代人落注！"); return;
                    }
                } catch (error) {
                    console.error("驗證錯誤: ", error); alert("🚨 系統錯誤：無法連接至伺服器驗證密碼。"); return;
                }
            }

            window.pendingBet = { matchId, selection, odds, player: currentPlayer };
            document.getElementById('bet-modal-player').innerText = currentPlayer;
            document.getElementById('bet-modal-selection').innerText = `${selection} (賠率 ${odds})`;
            document.getElementById('bet-amount-input').value = 10; 
            
            const modal = document.getElementById('bet-modal');
            const modalContent = document.getElementById('bet-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
        };

        window.adjustBet = (amount) => {
            const input = document.getElementById('bet-amount-input');
            let current = parseInt(input.value) || 10;
            current += amount;
            if (current < 5) current = 5;
            if (current > 100) current = 100;
            input.value = current;
        };

        window.closeBetModal = () => {
            const modal = document.getElementById('bet-modal');
            const modalContent = document.getElementById('bet-modal-content');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); window.pendingBet = null; }, 300);
        };

        window.confirmBet = async () => {
            if (!window.pendingBet) return;
            const amount = parseInt(document.getElementById('bet-amount-input').value);
            
            if (amount >= 5 && amount <= 100) {
                try {
                    await addDoc(collection(db, "bets"), { 
                        player: window.pendingBet.player, matchId: window.pendingBet.matchId, 
                        selection: window.pendingBet.selection, odds: window.pendingBet.odds, 
                        amount: amount, settled: false, profit: 0, timestamp: serverTimestamp() 
                    }); 
                    window.closeBetModal();
                } catch (e) {
                    alert("❌ 落注失敗，請重試！"); console.error(e);
                }
            }
        };

        onSnapshot(query(collection(db, "bets"), orderBy("timestamp", "desc")), (snapshot) => {
            const betsList = document.getElementById('bets-list'), leaderboardDiv = document.getElementById('leaderboard');
            betsList.innerHTML = ''; 
            
            window.playerBalances = { "Dennis": 0, "Samuel": 0, "Charles": 0, "Michael": 0, "Sha": 0, "Travis": 0 };
            
            if (snapshot.empty) { betsList.innerHTML = '<p class="text-gray-600 text-sm text-center">無紀錄</p>'; leaderboardDiv.innerHTML = '<p class="text-gray-600 text-sm text-center">無紀錄</p>'; return; }
            
            snapshot.forEach((doc) => {
                const bet = doc.data(); let resTxt = "等待開彩", resCol = "text-yellow-500 bg-yellow-500/10 px-2 py-1 rounded";
                if (bet.settled) {
                    if (bet.profit > 0 && bet.profit < (bet.amount * (bet.odds - 1))) { resTxt = `贏半 +$${bet.profit.toFixed(1)}`; resCol = "text-green-400 bg-green-500/10 px-2 py-1 rounded"; }
                    else if (bet.profit > 0) { resTxt = `贏全 +$${bet.profit.toFixed(1)}`; resCol = "text-green-500 font-bold bg-green-500/10 px-2 py-1 rounded"; }
                    else if (bet.profit === 0) { resTxt = `走水 $0`; resCol = "text-gray-400 bg-gray-600/20 px-2 py-1 rounded"; }
                    else if (bet.profit < 0 && bet.profit > -bet.amount) { resTxt = `輸半 -$${Math.abs(bet.profit).toFixed(1)}`; resCol = "text-red-400 bg-red-500/10 px-2 py-1 rounded"; }
                    else { resTxt = `輸全 -$${Math.abs(bet.profit).toFixed(1)}`; resCol = "text-red-500 font-bold bg-red-500/10 px-2 py-1 rounded"; }
                }
                
                let betAvatarColor = avatarColors[bet.player] || 'bg-gray-600';
                
                betsList.innerHTML += `
                    <div class="glass-panel p-4 rounded-xl flex justify-between items-center mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white shadow-sm border border-gray-700 ${betAvatarColor}">${bet.player.charAt(0)}</div>
                            <div>
                                <p class="font-bold text-gray-200 text-sm mb-0.5">${bet.player}</p>
                                <p class="text-xs text-gray-400">買: ${bet.selection} <span class="font-mono text-gray-300">($${bet.amount})</span></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xs ${resCol}">${resTxt}</span>
                            <span class="block text-[10px] text-gray-500 mt-2 font-mono tracking-tighter">${bet.settleDetail||''}</span>
                        </div>
                    </div>`;
                if (bet.settled && window.playerBalances[bet.player] !== undefined) window.playerBalances[bet.player] += bet.profit;
            });
            
            leaderboardDiv.innerHTML = '';
            window.updateHeaderBalance(); 

            Object.keys(window.playerBalances).sort((a, b) => window.playerBalances[b] - window.playerBalances[a]).forEach((p, i) => {
                let bal = window.playerBalances[p], cClass = bal > 0 ? 'text-green-500' : (bal < 0 ? 'text-red-500' : 'text-gray-400');
                
                let rankMedal = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':'<span class="w-[18px] inline-block"></span>'));
                let boardAvatarColor = avatarColors[p] || 'bg-gray-600';
                
                leaderboardDiv.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-gray-800 last:border-0">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg mr-1">${rankMedal}</span>
                            <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-white shadow-sm border border-gray-700 ${boardAvatarColor}">${p.charAt(0)}</div>
                            <span class="text-gray-200 text-sm font-semibold tracking-wide">${p}</span>
                        </div>
                        <span class="font-bold font-mono ${cClass}">${bal>0?'+':''}$${bal.toFixed(1)}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
